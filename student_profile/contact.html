<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Karyl Hyacinth Fabellon</title>
    <!-- External CSS - REQUIRED for lab activity -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>Contact Me</h1>
            <p>I'd love to hear from you!</p>
        </header>

        <!-- Navigation - FLEXBOX NAVBAR (REQUIRED) -->
        <nav>
            <ul class="navbar">
                <li><a href="index.html">🏠 Bio</a></li>
                <li><a href="contact.html" class="active">📧 Contact Me</a></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main>
            <div class="contact-section">
                <h2>Send Me a Message</h2>
                
                <div class="note">
                    <strong>📝 Note:</strong> All fields marked with <span class="required">*</span> are required.
                </div>

                <form action="#" method="post" class="contact-form">
                    
                    <!-- Name field -->
                    <div class="form-group">
                        <label for="fullname">Full Name <span class="required">*</span></label>
                        <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
                    </div>

                    <!-- Email Field -->
                    <div class="form-group">
                        <label for="email">Email Address <span class="required">*</span></label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required>
                    </div>

                    <!-- Phone Field -->
                    <div class="form-group">
                        <label for="phone">Phone Number (Opional)</label>
                        <input type="tel" id="phone" name="phone" placeholder="+63 912 345 6789">
                    </div>

                    <!-- Message textarea -->
                    <div class="form-group">
                        <label for="message">Your Message <span class="required">*</span></label>
                        <textarea id="message" name="message" rows="5" placeholder="Tell me about your project, question, or message..." required></textarea>
                    </div>

                    <!-- Submit button -->
                    <button type="submit" class="submit-btn">📨 Send Message</button>
                </form>
            </div>
        </main>

        <!-- Footer -->
        <footer>
            <p>&copy; 2026 Karyl Fabellon | Student Profile Website</p>
            <p><a href="index.html">← Back to Bio</a></p>
        </footer>
    </div>
</body>
</html>
